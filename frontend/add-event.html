<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Event - Eventify</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav style="padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;" class="container">
        <a href="index.html" class="logo">🎟️ Eventify</a>
        <div style="display: flex; gap: 20px; align-items: center;">
            <a href="index.html" style="text-decoration: none; color: var(--text-color); font-weight: 500;">Browse Events</a>
            <a href="dashboard.html" style="text-decoration: none; color: var(--text-color); font-weight: 500;">Dashboard</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px; margin-top: 50px; margin-bottom: 50px;">
        <div class="card glass">
            <h2 style="color: var(--primary-color); margin-bottom: 20px; text-align: center;">Add an Event to the List</h2>
            
            <form id="public-event-form">
                <div class="form-group">
                    <label>Event Title</label>
                    <input type="text" id="add-title" class="form-control" placeholder="e.g. Summer Music Festival" required>
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Date</label>
                        <input type="date" id="add-date" class="form-control" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Time</label>
                        <input type="time" id="add-time" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Venue / Location</label>
                    <input type="text" id="add-venue" class="form-control" placeholder="e.g. Central Park" required>
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Ticket Price (₹)</label>
                        <input type="number" step="0.01" id="add-price" class="form-control" placeholder="100.00" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Total Seats Available</label>
                        <input type="number" id="add-seats" class="form-control" placeholder="500" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Short Description (Optional)</label>
                    <textarea id="add-desc" class="form-control" rows="3" placeholder="Tell people what this event is about!"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary mt-2" style="width: 100%; font-size: 1.1rem; padding: 15px;">Publish Event</button>
            </form>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notification" class="notification"></div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('public-event-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                title: document.getElementById('add-title').value,
                date: document.getElementById('add-date').value,
                time: document.getElementById('add-time').value,
                venue: document.getElementById('add-venue').value,
                price: document.getElementById('add-price').value,
                seats: document.getElementById('add-seats').value,
                description: document.getElementById('add-desc').value,
            };

            try {
                const res = await fetch(`${API_URL}/events.php`, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                
                showNotification('Event successfully added to the listings!', 'success');
                
                // Give user a moment to see the success message
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (err) {
                showNotification(err.message, 'error');
            }
        });
    </script>
</body>
</html>
